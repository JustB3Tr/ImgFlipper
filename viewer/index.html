<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlipViewer</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --surface: #18181b;
  --surface-2: #27272a;
  --border: #3f3f46;
  --border-subtle: #27272a;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-glow: rgba(99,102,241,0.15);
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --success: #22c55e;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-card: 0 25px 60px -12px rgba(0,0,0,0.6);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================ */
/*  LAYOUT                                      */
/* ============================================ */

.app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(9,9,11,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.03em;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.header-actions {
  display: flex;
  gap: 8px;
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ============================================ */
/*  LANDING / DROP ZONE                         */
/* ============================================ */

.landing {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  gap: 48px;
}

.hero {
  text-align: center;
  max-width: 480px;
}

.hero h1 {
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 12px;
}

.hero h1 span { color: var(--accent); }

.hero p {
  color: var(--text-secondary);
  font-size: 1rem;
  line-height: 1.6;
}

.drop-zone {
  width: 100%;
  max-width: 520px;
  padding: 64px 40px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), transform var(--transition);
  position: relative;
  overflow: hidden;
}

.drop-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  transform: scale(1.01);
}

.drop-zone:hover::before, .drop-zone.dragover::before {
  opacity: 1;
}

.drop-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  background: var(--surface);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.drop-icon svg {
  width: 28px;
  height: 28px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.drop-zone h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}

.drop-zone p {
  color: var(--text-muted);
  font-size: 0.85rem;
  position: relative;
  z-index: 1;
}

.drop-zone .browse-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.file-input { display: none; }

.format-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--text-secondary);
  position: relative;
  z-index: 1;
}

.format-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
}

/* ============================================ */
/*  GALLERY                                     */
/* ============================================ */

.gallery-section {
  display: none;
  padding: 24px;
}
.gallery-section.active { display: block; }

.gallery-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.gallery-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.gallery-count {
  color: var(--text-muted);
  font-size: 0.85rem;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.gallery-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
}

.gallery-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.gallery-card-thumb {
  width: 100%;
  aspect-ratio: 1.6;
  object-fit: cover;
  display: block;
  background: var(--surface-2);
}

.gallery-card-info {
  padding: 12px;
}

.gallery-card-info .card-label {
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.gallery-card-info .card-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============================================ */
/*  VIEWER                                      */
/* ============================================ */

.viewer-section {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 28px;
}
.viewer-section.active {
  display: flex;
}

.viewer-top-bar {
  display: flex;
  align-items: center;
  gap: 16px;
}

.viewer-label {
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.side-badge {
  display: inline-flex;
  padding: 4px 12px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  transition: all var(--transition);
}

.card-scene {
  perspective: 1400px;
  width: 100%;
  max-width: 540px;
}

.card-3d {
  position: relative;
  width: 100%;
  aspect-ratio: var(--card-ar, 1.6);
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  cursor: pointer;
  border-radius: var(--radius);
}

.card-3d.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.card-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-face.is-back {
  transform: rotateY(180deg);
}

.viewer-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  border-color: var(--border);
  background: var(--surface);
  color: var(--text);
}

.btn-icon {
  padding: 10px;
  border-radius: 10px;
}

.btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.hint-text {
  color: var(--text-muted);
  font-size: 0.75rem;
}

.kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  font-size: 0.7rem;
  font-family: monospace;
  color: var(--text-secondary);
}

/* ============================================ */
/*  TOAST / NOTIFICATIONS                       */
/* ============================================ */

.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease-out;
}

.toast.error { border-color: #ef4444; }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================ */
/*  RESPONSIVE                                  */
/* ============================================ */

@media (max-width: 640px) {
  .hero h1 { font-size: 1.6rem; }
  .drop-zone { padding: 44px 24px; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  header { padding: 12px 16px; }
  .viewer-section { padding: 16px; }
  .card-scene { max-width: 100%; }
}

/* ============================================ */
/*  SWIPE HINT ANIMATION                        */
/* ============================================ */

@keyframes swipeHint {
  0%, 100% { transform: rotateY(0deg); }
  25% { transform: rotateY(15deg); }
  75% { transform: rotateY(-15deg); }
}

.card-3d.hint-anim {
  animation: swipeHint 1.5s ease-in-out;
}

.meta-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; background: var(--surface);
  border: 1px solid var(--border-subtle); border-radius: 14px;
  font-size: 0.7rem; color: var(--text-muted);
}
.meta-badge svg { width: 12px; height: 12px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="white" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
      <span>FlipViewer</span>
    </div>
    <div class="header-actions">
      <a href="capture.html" class="btn btn-ghost" style="font-size:0.8rem;padding:8px 16px;text-decoration:none;">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Capture
      </a>
      <button class="btn btn-ghost btn-icon" id="btn-add" title="Open .flip file">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- Landing -->
    <section class="landing" id="section-landing">
      <div class="hero">
        <h1>View any <span>.flip</span> file</h1>
        <p>Open a single .flip file to see both sides of a card, document, or paper — and flip between them.</p>
      </div>

      <div class="drop-zone" id="drop-zone" tabindex="0">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <h3>Drop your .flip file here</h3>
        <p>or <span class="browse-link">browse files</span></p>
        <div class="format-badge">
          <span class="dot"></span>
          Supports .flip format v1.0+
        </div>
      </div>

      <input type="file" class="file-input" id="file-input" accept=".flip" multiple>
    </section>

    <!-- Gallery (when multiple files loaded) -->
    <section class="gallery-section" id="section-gallery">
      <div class="gallery-header">
        <h2>Your Cards</h2>
        <span class="gallery-count" id="gallery-count"></span>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <!-- Single card viewer -->
    <section class="viewer-section" id="section-viewer">
      <div class="viewer-top-bar">
        <span class="viewer-label" id="viewer-label"></span>
        <span class="side-badge" id="side-badge">FRONT</span>
      </div>
      <div class="viewer-meta" id="viewer-meta" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"></div>

      <div class="card-scene">
        <div class="card-3d" id="card-3d">
          <div class="card-face is-front">
            <img id="img-front" alt="Front side">
          </div>
          <div class="card-face is-back">
            <img id="img-back" alt="Back side">
          </div>
        </div>
      </div>

      <div class="viewer-controls">
        <button class="btn btn-primary" id="btn-flip">
          <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          Flip
        </button>
        <button class="btn btn-ghost" id="btn-back-gallery">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <button class="btn btn-ghost" id="btn-open-another">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Open
        </button>
      </div>

      <p class="hint-text">Click the card, tap <kbd class="kbd">Space</kbd>, or swipe to flip</p>
    </section>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ======================================================
//  State
// ======================================================
const state = {
  cards: [],       // { manifest, frontURL, backURL, fileName }
  currentIdx: -1,
  isFlipped: false,
};

// ======================================================
//  DOM refs
// ======================================================
const $ = id => document.getElementById(id);

const sectionLanding = $('section-landing');
const sectionGallery = $('section-gallery');
const sectionViewer  = $('section-viewer');
const dropZone       = $('drop-zone');
const fileInput      = $('file-input');
const galleryGrid    = $('gallery-grid');
const galleryCount   = $('gallery-count');
const card3d         = $('card-3d');
const imgFront       = $('img-front');
const imgBack        = $('img-back');
const viewerLabel    = $('viewer-label');
const sideBadge      = $('side-badge');
const btnFlip        = $('btn-flip');
const btnBack        = $('btn-back-gallery');
const btnOpen        = $('btn-open-another');
const btnAdd         = $('btn-add');

// ======================================================
//  Sections
// ======================================================
function showSection(name) {
  sectionLanding.classList.remove('active');
  sectionGallery.classList.remove('active');
  sectionViewer.classList.remove('active');
  sectionLanding.style.display = 'none';
  sectionGallery.style.display = 'none';
  sectionViewer.style.display  = 'none';

  if (name === 'landing') {
    sectionLanding.style.display = '';
  } else if (name === 'gallery') {
    sectionGallery.style.display = '';
    sectionGallery.classList.add('active');
    renderGallery();
  } else if (name === 'viewer') {
    sectionViewer.style.display = '';
    sectionViewer.classList.add('active');
  }
}

// ======================================================
//  File loading
// ======================================================
async function loadFlipFile(file) {
  try {
    const zip = await JSZip.loadAsync(file);

    const manifestEntry = zip.file('manifest.json');
    if (!manifestEntry) throw new Error('Missing manifest.json');

    const manifest = JSON.parse(await manifestEntry.async('string'));
    if (manifest.format !== 'flip') throw new Error('Not a .flip file');

    const frontFile = manifest.images.front.file;
    const backFile  = manifest.images.back.file;

    const [frontBlob, backBlob] = await Promise.all([
      zip.file(frontFile).async('blob'),
      zip.file(backFile).async('blob'),
    ]);

    let thumbURL = null;
    if (manifest.thumbnail?.file) {
      const thumbEntry = zip.file(manifest.thumbnail.file);
      if (thumbEntry) {
        const thumbBlob = await thumbEntry.async('blob');
        thumbURL = URL.createObjectURL(thumbBlob);
      }
    }

    const card = {
      manifest,
      frontURL: URL.createObjectURL(frontBlob),
      backURL:  URL.createObjectURL(backBlob),
      thumbURL: thumbURL || URL.createObjectURL(frontBlob),
      fileName: file.name,
    };

    state.cards.push(card);
    return card;
  } catch (err) {
    console.error(err);
    toast('Could not open ' + file.name + '. Is it a valid .flip file?', true);
    return null;
  }
}

async function handleFiles(files) {
  const validFiles = [...files].filter(f => f.name.endsWith('.flip'));
  if (!validFiles.length) {
    toast('Please select .flip files.', true);
    return;
  }

  const results = await Promise.all(validFiles.map(loadFlipFile));
  const loaded = results.filter(Boolean);
  if (!loaded.length) return;

  if (state.cards.length === 1) {
    openCard(0);
  } else if (state.cards.length > 1) {
    showSection('gallery');
  }

  toast(loaded.length + ' card' + (loaded.length > 1 ? 's' : '') + ' loaded');
}

// ======================================================
//  Gallery
// ======================================================
function renderGallery() {
  galleryGrid.innerHTML = '';
  galleryCount.textContent = state.cards.length + ' card' + (state.cards.length !== 1 ? 's' : '');

  state.cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'gallery-card';
    el.innerHTML = `
      <img class="gallery-card-thumb" src="${card.thumbURL}" alt="">
      <div class="gallery-card-info">
        <div class="card-label">${card.manifest.object?.label || card.fileName.replace('.flip','')}</div>
        <div class="card-meta">${card.manifest.object?.type ? card.manifest.object.type + ' — ' : ''}${card.manifest.images.front.width} x ${card.manifest.images.front.height}</div>
      </div>
    `;
    el.addEventListener('click', () => openCard(idx));
    galleryGrid.appendChild(el);
  });
}

// ======================================================
//  Viewer
// ======================================================
function openCard(idx) {
  const card = state.cards[idx];
  if (!card) return;

  state.currentIdx = idx;
  state.isFlipped = false;

  imgFront.src = card.frontURL;
  imgBack.src  = card.backURL;

  const w = card.manifest.images.front.width;
  const h = card.manifest.images.front.height;
  card3d.style.setProperty('--card-ar', (w / h).toFixed(4));

  viewerLabel.textContent = card.manifest.object?.label || card.fileName.replace('.flip', '');
  sideBadge.textContent = 'FRONT';
  card3d.classList.remove('flipped');

  // Populate metadata badges
  const metaEl = $('viewer-meta');
  metaEl.innerHTML = '';
  const obj = card.manifest.object || {};
  if (obj.type) {
    metaEl.innerHTML += `<span class="meta-badge"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>${obj.type}</span>`;
  }
  if (obj.size_inches) {
    const [sw, sh] = obj.size_inches;
    metaEl.innerHTML += `<span class="meta-badge"><svg viewBox="0 0 24 24"><path d="M21 3H3v18"/><path d="M21 3v18"/><path d="M3 21h18"/></svg>${sw.toFixed(1)}" x ${sh.toFixed(1)}"</span>`;
  }
  const dims = card.manifest.images?.front;
  if (dims) {
    metaEl.innerHTML += `<span class="meta-badge"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>${dims.width}x${dims.height}px</span>`;
  }

  showSection('viewer');

  setTimeout(() => {
    card3d.classList.add('hint-anim');
    card3d.addEventListener('animationend', () => card3d.classList.remove('hint-anim'), { once: true });
  }, 600);
}

function flipCard() {
  state.isFlipped = !state.isFlipped;
  card3d.classList.toggle('flipped', state.isFlipped);
  sideBadge.textContent = state.isFlipped ? 'BACK' : 'FRONT';
}

// ======================================================
//  Toast
// ======================================================
function toast(msg, isError = false) {
  const container = $('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, 3000);
}

// ======================================================
//  Events
// ======================================================

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFiles(fileInput.files);
});

// Also support whole-page drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  if (e.target !== dropZone && !dropZone.contains(e.target)) {
    handleFiles(e.dataTransfer.files);
  }
});

// Header add button
btnAdd.addEventListener('click', () => fileInput.click());

// Viewer
card3d.addEventListener('click', flipCard);
btnFlip.addEventListener('click', flipCard);

btnBack.addEventListener('click', () => {
  if (state.cards.length > 1) {
    showSection('gallery');
  } else {
    showSection('landing');
  }
});

btnOpen.addEventListener('click', () => fileInput.click());

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && sectionViewer.style.display !== 'none') {
    e.preventDefault();
    flipCard();
  }
  if (e.code === 'Escape') {
    if (sectionViewer.style.display !== 'none') {
      btnBack.click();
    }
  }
  if (e.code === 'ArrowLeft' && sectionViewer.style.display !== 'none' && state.currentIdx > 0) {
    openCard(state.currentIdx - 1);
  }
  if (e.code === 'ArrowRight' && sectionViewer.style.display !== 'none' && state.currentIdx < state.cards.length - 1) {
    openCard(state.currentIdx + 1);
  }
});

// Touch swipe for flip
let touchStartX = 0;
card3d.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
card3d.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) flipCard();
}, { passive: true });

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// PWA file handler (when opening .flip files from OS)
if ('launchQueue' in window) {
  window.launchQueue.setConsumer(async launchParams => {
    for (const fh of launchParams.files) {
      const file = await fh.getFile();
      handleFiles([file]);
    }
  });
}

// Init
showSection('landing');
</script>
</body>
</html>
