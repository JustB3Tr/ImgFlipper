<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.flip Viewer</title>
<style>
  :root {
    --bg: #0f0f13;
    --card-bg: #1a1a24;
    --accent: #6c63ff;
    --accent-hover: #8b83ff;
    --text: #e8e8ed;
    --text-muted: #8888a0;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }

  /* ---- Drop zone ---- */
  #drop-zone {
    width: 420px;
    max-width: 92vw;
    padding: 56px 32px;
    border: 2px dashed #333;
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.06);
  }
  #drop-zone p { color: var(--text-muted); margin-top: 12px; font-size: 0.9rem; }
  #drop-zone .icon { font-size: 2.4rem; }

  #file-input { display: none; }

  /* ---- Viewer ---- */
  #viewer {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  #viewer.active { display: flex; }

  .card-wrapper {
    perspective: 1200px;
    width: 480px;
    max-width: 92vw;
  }

  .card {
    position: relative;
    width: 100%;
    aspect-ratio: var(--card-aspect, 1.75);
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border-radius: var(--radius);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  .card-face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-face.back {
    transform: rotateY(180deg);
  }

  .label-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .label-bar .label { color: var(--text); font-weight: 500; }

  .controls {
    display: flex;
    gap: 12px;
  }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
    font-weight: 500;
  }
  button:hover { background: var(--accent-hover); }

  .btn-outline {
    background: transparent;
    border: 1px solid #333;
    color: var(--text-muted);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(108, 99, 255, 0.08);
  }

  .side-indicator {
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .hint {
    color: var(--text-muted);
    font-size: 0.75rem;
    opacity: 0.6;
  }
</style>
</head>
<body>

<!-- Drop / open UI -->
<div id="intro">
  <h1>.flip Viewer</h1>
  <p class="subtitle">Open a .flip file to view both sides</p>
  <div id="drop-zone" tabindex="0">
    <div class="icon">📄</div>
    <p>Drop a <strong>.flip</strong> file here or click to browse</p>
  </div>
  <input type="file" id="file-input" accept=".flip">
</div>

<!-- Card viewer -->
<div id="viewer">
  <div class="label-bar">
    <span class="label" id="label-text"></span>
    <span class="side-indicator" id="side-label">FRONT</span>
  </div>

  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="card-face front"><img id="img-front" alt="Front"></div>
      <div class="card-face back"><img id="img-back" alt="Back"></div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-flip">Flip</button>
    <button class="btn-outline" id="btn-close">Open another</button>
  </div>

  <p class="hint">Click the card or press Space to flip</p>
</div>

<!-- JSZip via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const intro     = document.getElementById('intro');
const viewer    = document.getElementById('viewer');
const card      = document.getElementById('card');
const imgFront  = document.getElementById('img-front');
const imgBack   = document.getElementById('img-back');
const labelText = document.getElementById('label-text');
const sideLabel = document.getElementById('side-label');
const btnFlip   = document.getElementById('btn-flip');
const btnClose  = document.getElementById('btn-close');

let isFlipped = false;

// ---- File handling ----
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) loadFile(fileInput.files[0]);
});

async function loadFile(file) {
  try {
    const zip = await JSZip.loadAsync(file);

    const manifestText = await zip.file('manifest.json').async('string');
    const manifest = JSON.parse(manifestText);

    if (manifest.format !== 'flip') {
      alert('Not a valid .flip file.');
      return;
    }

    const frontFile = manifest.images.front.file;
    const backFile  = manifest.images.back.file;

    const [frontBlob, backBlob] = await Promise.all([
      zip.file(frontFile).async('blob'),
      zip.file(backFile).async('blob'),
    ]);

    const frontURL = URL.createObjectURL(frontBlob);
    const backURL  = URL.createObjectURL(backBlob);

    imgFront.src = frontURL;
    imgBack.src  = backURL;

    const w = manifest.images.front.width;
    const h = manifest.images.front.height;
    card.style.setProperty('--card-aspect', (w / h).toFixed(4));

    labelText.textContent = manifest.object?.label || file.name.replace('.flip', '');

    isFlipped = false;
    card.classList.remove('flipped');
    sideLabel.textContent = 'FRONT';

    intro.style.display = 'none';
    viewer.classList.add('active');
  } catch (err) {
    console.error(err);
    alert('Could not open file. Make sure it is a valid .flip archive.');
  }
}

// ---- Flip interaction ----
function flipCard() {
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
  sideLabel.textContent = isFlipped ? 'BACK' : 'FRONT';
}

card.addEventListener('click', flipCard);
btnFlip.addEventListener('click', flipCard);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && viewer.classList.contains('active')) {
    e.preventDefault();
    flipCard();
  }
});

btnClose.addEventListener('click', () => {
  viewer.classList.remove('active');
  intro.style.display = '';
  fileInput.value = '';
});
</script>
</body>
</html>
